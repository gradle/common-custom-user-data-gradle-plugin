name: Verify Build
permissions:
  contents: read
on: [ push, pull_request, workflow_dispatch ]

env:
  # Artifact Cache Configuration
  ARTIFACT_CACHE_CLI_VERSION: 0.11.0

  # Develocity
  DV_SERVER: https://ge.solutions-team.gradle.com
  DEVELOCITY_ACCESS_KEY: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}

  # Artifact Cache CLI
  ARTIFACT_CACHE_REPO_USERNAME: ${{ secrets.ARTIFACT_CACHE_REPO_USERNAME }}
  ARTIFACT_CACHE_REPO_PASSWORD: ${{ secrets.ARTIFACT_CACHE_REPO_PASSWORD }}
  ARTIFACT_CACHE_REPO: ${{ secrets.ARTIFACT_CACHE_REPO }}

  # Misc
  ARTIFACT_CACHE_CLI_FILENAME: develocity-artifact-cache-cli
#  ARTIFACT_CACHE_OPTS: "--gradle-home=/home/runner/.gradle"
  ARTIFACT_CACHE_OPTS: "--disable-setup-cache"
  ARTIFACT_CACHE_STORE: true

  GRADLE_ARGS: "-Dscan.tag.ac-step-4"

jobs:
  verification:
    name: Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6
        with:
          cache-disabled: true
          develocity-access-key: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}
      - name: Setup and restore Artifact Cache
        uses: ./.github/actions/setup-and-restore-artifact-cache
      - name: Build and publish to Maven Local with Gradle
        run: ./gradlew build publishToMavenLocal -x signPluginMavenPublication -i -Porg.gradle.java.installations.auto-download=false ${{ env.GRADLE_ARGS }}
        env:
          DISABLE_REQUIRED_SIGNING: true
      - name: Upload published plugin
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: common-custom-user-data-gradle-plugin
          path: ~/.m2/repository/com/gradle
      - name: Store Artifact Cache
        uses: ./.github/actions/store-artifact-cache
        if: env.ARTIFACT_CACHE_STORE == 'true'
        with:
          artifact-name: artifact-cache-${{ github.job }}.log

  local-test:
    name: Test with Locally Published Plugin
    runs-on: ubuntu-latest
    needs: verification
    strategy:
      fail-fast: false
      matrix:
        include:
          - gradle-version: '5.0'
            java-version: '8'
          - gradle-version: '6.0'
            java-version: '8'
          - gradle-version: '6.5'
            java-version: '8'
          - gradle-version: '7.0'
            java-version: '8'
          - gradle-version: '8.0'
            java-version: '8'
          - gradle-version: '9.0.0'
            java-version: '21'
          - gradle-version: 'current'
            java-version: '21'
          - gradle-version: 'release-candidate'
            java-version: '21'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '${{ matrix.java-version }}'
          distribution: 'temurin'
      - name: Set up Gradle ${{ matrix.gradle-version }}
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6
        with:
          cache-disabled: true
          develocity-access-key: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}
          gradle-version: '${{ matrix.gradle-version }}'
      - name: Download plugin to maven local
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: common-custom-user-data-gradle-plugin
          path: ~/.m2/repository/com/gradle
      - name: Create the test project for Gradle 5.0, 6.0 and 6.5
        if: matrix.gradle-version == '5.0' || matrix.gradle-version == '6.0' || matrix.gradle-version == '6.5'
        run: |
          { [ "${{ matrix.gradle-version }}" == "5.0" ] && output_file="build.gradle" || output_file="settings.gradle"; }; echo """
            buildscript {
                repositories {
                mavenLocal()
                maven { url 'https://plugins.gradle.org/m2/' }
              }
                dependencies {
                classpath 'com.gradle.develocity:com.gradle.develocity.gradle.plugin:4+'
                classpath 'com.gradle.common-custom-user-data-gradle-plugin:com.gradle.common-custom-user-data-gradle-plugin.gradle.plugin:2+'
              }
            }
            
            apply plugin: 'com.gradle.develocity'
            apply plugin: 'com.gradle.common-custom-user-data-gradle-plugin'
              
            develocity {
              server = 'https://ge.solutions-team.gradle.com'
            }
          """ > ${{ runner.temp }}/"$output_file"
          
          echo """
            rootProject.name = \"ccud-test-gradle-${{ matrix.gradle-version }}\"
          """ >> ${{ runner.temp }}/settings.gradle
          
          echo """
            org.gradle.vfs.watch=true
            org.gradle.daemon=true
            org.gradle.parallel=true
            org.gradle.caching=true
            org.gradle.jvmargs=-Duser.language=en -Duser.country=US -Dfile.encoding=UTF-8
          """ > ${{ runner.temp }}/gradle.properties

      - name: Create the test project for Gradle 7.0 and above
        if: matrix.gradle-version != '5.0' && matrix.gradle-version != '6.0' && matrix.gradle-version != '6.5'
        run: |
          echo """
            pluginManagement {
              repositories {
                gradlePluginPortal()
                exclusiveContent {
                  forRepository {
                    mavenLocal()
                  }
                  filter {
                    includeModule(\"com.gradle\", \"common-custom-user-data-gradle-plugin\")
                    includeModule(\"com.gradle.common-custom-user-data-gradle-plugin\", \"com.gradle.common-custom-user-data-gradle-plugin.gradle.plugin\")
                  }
                }
              }
            }
          
            plugins {
              id(\"com.gradle.develocity\") version \"4+\"
              id(\"com.gradle.common-custom-user-data-gradle-plugin\") version \"2+\"
            }
          
            develocity {
              server = \"https://ge.solutions-team.gradle.com\"
            }
          
            rootProject.name = \"ccud-test-gradle-${{ matrix.gradle-version }}\"
          """ > ${{ runner.temp }}/settings.gradle
          
          echo """
            org.gradle.vfs.watch=true
            org.gradle.daemon=true
            org.gradle.parallel=true
            org.gradle.caching=true
            org.gradle.configuration-cache=true
            org.gradle.unsafe.configuration-cache=true
            org.gradle.jvmargs=-Duser.language=en -Duser.country=US -Dfile.encoding=UTF-8
          """ > ${{ runner.temp }}/gradle.properties

      - name: Run a build with the locally published plugin
        id: build-with-local-plugin
        run: gradle help "-Dscan.value.gradle-version=${{ matrix.gradle-version }}" "-Dscan.value.java-version=${{ matrix.java-version }}"
        working-directory: ${{ runner.temp }}